<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>VoteChain — Biometric Registration</title>
    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;600;700;900&display=swap"
        rel="stylesheet" />
    <!-- Load face-api.js directly from a CDN -->
    <script defer src="https://cdn.jsdelivr.net/npm/face-api.js@0.22.2/dist/face-api.min.js"></script>

    <style>
        *,
        *::before,
        *::after {
            box-sizing: border-box;
            margin: 0;
            padding: 0;
        }

        body {
            font-family: 'Inter', sans-serif;
            min-height: 100vh;
            display: flex;
            align-items: center;
            justify-content: center;
            background: linear-gradient(135deg, #0f0c29 0%, #1a1a4e 50%, #24243e 100%);
            color: #fff;
            padding: 20px;
        }

        /* Animated background blobs */
        body::before,
        body::after {
            content: '';
            position: fixed;
            border-radius: 50%;
            filter: blur(80px);
            opacity: 0.15;
            animation: drift 10s ease-in-out infinite alternate;
            z-index: 0;
        }

        body::before {
            width: 600px;
            height: 600px;
            background: radial-gradient(circle, #6c63ff, #3b1cb7);
            top: -200px;
            left: -100px;
        }

        body::after {
            width: 400px;
            height: 400px;
            background: radial-gradient(circle, #00d4ff, #0082ff);
            bottom: -100px;
            right: -100px;
            animation-delay: 5s;
        }

        @keyframes drift {
            from {
                transform: translate(0, 0) scale(1);
            }

            to {
                transform: translate(40px, 30px) scale(1.1);
            }
        }

        .container {
            background: rgba(255, 255, 255, 0.05);
            backdrop-filter: blur(20px);
            border: 1px solid rgba(255, 255, 255, 0.1);
            border-radius: 24px;
            padding: 40px;
            width: 100%;
            max-width: 800px;
            box-shadow: 0 32px 64px rgba(0, 0, 0, 0.5);
            position: relative;
            z-index: 10;
            display: flex;
            gap: 40px;
        }

        .column {
            flex: 1;
        }

        h1 {
            font-size: 28px;
            font-weight: 800;
            margin-bottom: 8px;
        }

        p.sub {
            font-size: 14px;
            color: rgba(255, 255, 255, 0.55);
            margin-bottom: 30px;
        }

        label {
            display: block;
            font-size: 12px;
            font-weight: 600;
            color: rgba(255, 255, 255, 0.7);
            letter-spacing: .5px;
            text-transform: uppercase;
            margin-bottom: 8px;
        }

        input[type="text"],
        input[type="password"],
        input[type="email"] {
            width: 100%;
            background: rgba(255, 255, 255, 0.07);
            border: 1px solid rgba(255, 255, 255, 0.12);
            border-radius: 12px;
            padding: 12px 16px;
            color: #fff;
            font-size: 14px;
            font-family: inherit;
            outline: none;
            transition: border-color .2s, box-shadow .2s;
            margin-bottom: 16px;
        }

        input:focus {
            border-color: #6c63ff;
            box-shadow: 0 0 0 3px rgba(108, 99, 255, 0.2);
        }

        input::placeholder {
            color: rgba(255, 255, 255, 0.3);
        }

        .video-container {
            position: relative;
            width: 100%;
            height: 280px;
            background: #000;
            border-radius: 16px;
            overflow: hidden;
            margin-bottom: 20px;
            border: 2px solid rgba(255, 255, 255, 0.1);
        }

        video {
            width: 100%;
            height: 100%;
            object-fit: cover;
            transform: scaleX(-1);
            /* Mirror effect */
        }

        canvas {
            position: absolute;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            z-index: 10;
        }

        .status-badge {
            position: absolute;
            top: 12px;
            right: 12px;
            background: rgba(0, 0, 0, 0.6);
            backdrop-filter: blur(4px);
            padding: 6px 12px;
            border-radius: 20px;
            font-size: 12px;
            font-weight: 600;
            z-index: 20;
            display: flex;
            align-items: center;
            gap: 6px;
        }

        .dot {
            width: 8px;
            height: 8px;
            border-radius: 50%;
            background: #ffbd44;
        }

        .dot.green {
            background: #00ca4e;
            box-shadow: 0 0 8px #00ca4e;
        }

        .dot.red {
            background: #ff605c;
            box-shadow: 0 0 8px #ff605c;
        }

        button {
            width: 100%;
            background: linear-gradient(135deg, #6c63ff, #3b1cb7);
            color: #fff;
            border: none;
            border-radius: 12px;
            padding: 15px;
            font-size: 16px;
            font-weight: 700;
            font-family: inherit;
            cursor: pointer;
            transition: transform .15s, box-shadow .2s, opacity .2s;
        }

        button:hover:not(:disabled) {
            transform: translateY(-2px);
            box-shadow: 0 8px 24px rgba(108, 99, 255, 0.45);
        }

        button:active:not(:disabled) {
            transform: translateY(0);
        }

        button:disabled {
            background: #444;
            color: #888;
            cursor: not-allowed;
            box-shadow: none;
            transform: none;
        }

        .capture-btn {
            background: rgba(255, 255, 255, 0.1);
            border: 1px solid rgba(255, 255, 255, 0.2);
            margin-bottom: 12px;
        }

        .capture-btn:hover:not(:disabled) {
            background: rgba(255, 255, 255, 0.2);
            box-shadow: none;
        }

        .capture-btn.success {
            background: rgba(0, 202, 78, 0.2);
            border-color: #00ca4e;
            color: #00ca4e;
        }

        .message {
            font-size: 13px;
            margin-top: 12px;
            text-align: center;
        }

        .message.success {
            color: #00ca4e;
        }

        .message.error {
            color: #ff605c;
        }

        .back-link {
            display: inline-block;
            margin-top: 20px;
            color: rgba(255, 255, 255, 0.6);
            text-decoration: none;
            font-size: 14px;
            transition: color 0.2s;
        }

        .back-link:hover {
            color: #fff;
        }

        @media (max-width: 768px) {
            .container {
                flex-direction: column;
                gap: 20px;
            }
        }
    </style>
</head>

<body>

    <div class="container">
        <div class="column">
            <h1>Register to Vote</h1>
            <p class="sub">Create your biometric identity to cast votes securely.</p>

            <label for="voter_id">Voter ID</label>
            <input type="text" id="voter_id" placeholder="Create a unique ID (e.g. adhaar_1234)" />

            <label for="full_name">Full Name</label>
            <input type="text" id="full_name" placeholder="John Doe" />

            <label for="email">Email</label>
            <input type="email" id="email" placeholder="john@example.com" />

            <label for="password">Password</label>
            <input type="password" id="password" placeholder="Create a strong password" />

            <a href="/" class="back-link">← Back to Login</a>
        </div>

        <div class="column">
            <div class="video-container" id="videoContainer">
                <video id="video" autoplay muted playsinline></video>
                <div class="status-badge" id="statusBadge">
                    <div class="dot" id="statusDot"></div><span id="statusText">Loading AI Models...</span>
                </div>
            </div>

            <button id="captureBtn" class="capture-btn" disabled onclick="captureFace()">Take Face Scan</button>
            <button id="submitBtn" disabled onclick="submitRegistration()">Submit Registration</button>
            <div id="msg" class="message"></div>
        </div>
    </div>

    <script>
        const video = document.getElementById('video');
        const videoContainer = document.getElementById('videoContainer');
        const captureBtn = document.getElementById('captureBtn');
        const submitBtn = document.getElementById('submitBtn');
        const msgEl = document.getElementById('msg');
        const statusText = document.getElementById('statusText');
        const statusDot = document.getElementById('statusDot');

        let currentEmbedding = null;
        let modelsLoaded = false;
        let isDetecting = false;

        // 1. Load Face-API Models
        async function loadModels() {
            try {
                await Promise.all([
                    faceapi.nets.ssdMobilenetv1.loadFromUri('/models'),
                    faceapi.nets.faceLandmark68Net.loadFromUri('/models'),
                    faceapi.nets.faceRecognitionNet.loadFromUri('/models')
                ]);
                modelsLoaded = true;
                statusText.innerText = 'Starting Camera...';
                startVideo();
            } catch (err) {
                console.error("Model load error:", err);
                showMsg('Failed to load face detection models.', 'error');
                statusDot.className = 'dot red';
                statusText.innerText = 'Error';
            }
        }

        // 2. Start Webcam
        function startVideo() {
            navigator.mediaDevices.getUserMedia({ video: { width: 400, height: 300 } })
                .then(stream => {
                    video.srcObject = stream;
                })
                .catch(err => {
                    console.error(err);
                    showMsg('Camera access denied or unavailable.', 'error');
                    statusDot.className = 'dot red';
                    statusText.innerText = 'No Camera';
                });
        }

        // 3. Handle Video Play - Start tracking faces
        video.addEventListener('play', () => {
            const canvas = faceapi.createCanvasFromMedia(video);
            videoContainer.appendChild(canvas);
            const displaySize = { width: videoContainer.clientWidth, height: videoContainer.clientHeight };
            faceapi.matchDimensions(canvas, displaySize);

            statusDot.className = 'dot green';
            statusText.innerText = 'Ready';
            captureBtn.disabled = false;
            captureBtn.innerText = 'Scan Face';

            // Continuously draw bounding box (visual feedback)
            setInterval(async () => {
                if (!modelsLoaded) return;
                isDetecting = true;

                // Use a tiny delay to not freeze the UI too much
                const detections = await faceapi.detectSingleFace(video).withFaceLandmarks();

                const ctx = canvas.getContext('2d');
                ctx.clearRect(0, 0, canvas.width, canvas.height);

                if (detections) {
                    const resizedDetections = faceapi.resizeResults(detections, displaySize);

                    // Draw bounding box, but we need to flip the X coordinate because the video CSS is flipped (scaleX(-1))
                    // For a simple visual, we just draw the box directly with faceapi, though it will appear mirrored.
                    // To fix the mirror perfectly requires custom drawing, but we'll use the default for now.
                    ctx.save();
                    // Flip the canvas context so the drawing matches the flipped video
                    ctx.translate(canvas.width, 0);
                    ctx.scale(-1, 1);
                    faceapi.draw.drawDetections(canvas, resizedDetections);
                    faceapi.draw.drawFaceLandmarks(canvas, resizedDetections);
                    ctx.restore();

                    if (statusText.innerText === 'Ready') {
                        statusText.innerText = 'Face Detected';
                        statusDot.className = 'dot green';
                    }
                } else {
                    if (statusText.innerText === 'Face Detected') {
                        statusText.innerText = 'Ready';
                    }
                }
                isDetecting = false;
            }, 150);
        });

        // 4. Capture the Face Embedding
        async function captureFace() {
            if (isDetecting) {
                showMsg('Processing... please wait a moment.', '');
                setTimeout(captureFace, 200);
                return;
            }

            captureBtn.innerText = 'Scanning... Hold still';
            captureBtn.disabled = true;
            msgEl.innerText = '';

            try {
                const detection = await faceapi.detectSingleFace(video).withFaceLandmarks().withFaceDescriptor();

                if (!detection) {
                    showMsg('No face detected. Please ensure you are clearly visible.', 'error');
                    captureBtn.disabled = false;
                    captureBtn.innerText = 'Try Again';
                    return;
                }

                currentEmbedding = Array.from(detection.descriptor); // Convert Float32Array to standard JS Array

                captureBtn.className = 'capture-btn success';
                captureBtn.innerText = '✓ Face Scan Complete';
                submitBtn.disabled = false;
                showMsg('Biometric data captured successfully!', 'success');

            } catch (err) {
                console.error(err);
                showMsg('Error capturing face.', 'error');
                captureBtn.disabled = false;
                captureBtn.innerText = 'Try Again';
            }
        }

        // 5. Submit Registration to Node.js backend
        async function submitRegistration() {
            const voter_id = document.getElementById('voter_id').value.trim();
            const full_name = document.getElementById('full_name').value.trim();
            const email = document.getElementById('email').value.trim();
            const password = document.getElementById('password').value;

            if (!voter_id || !full_name || !password) {
                showMsg('Please fill in all required text fields.', 'error');
                return;
            }
            if (!currentEmbedding) {
                showMsg('Please complete the face scan first.', 'error');
                return;
            }

            submitBtn.disabled = true;
            submitBtn.innerText = 'Submitting...';

            try {
                const payload = {
                    voter_id,
                    password,
                    full_name,
                    email,
                    face_embedding: currentEmbedding,
                    booth_id: 'BOOTH001' // Defaulting for now
                };

                const res = await fetch('/api/register', {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify(payload)
                });

                const data = await res.json();

                if (res.ok) {
                    document.querySelector('.container').innerHTML = `
                <div style="text-align: center; width: 100%; padding: 40px 0;">
                    <div style="font-size: 48px; margin-bottom: 20px;">✅</div>
                    <h2 style="margin-bottom: 10px;">Registration Submitted</h2>
                    <p style="color: rgba(255,255,255,0.7); margin-bottom: 30px;">
                        Your biometric profile has been created.<br>
                        Please wait for an Election Administrator to approve your account.
                    </p>
                    <a href="/" style="display: inline-block; padding: 12px 24px; background: rgba(255,255,255,0.1); border-radius: 8px; color: #fff; text-decoration: none; font-weight: 600;">Return to Login</a>
                </div>
            `;
                    // Stop camera
                    if (video.srcObject) {
                        video.srcObject.getTracks().forEach(track => track.stop());
                    }
                } else {
                    showMsg(data.error || 'Server rejected registration.', 'error');
                    submitBtn.disabled = false;
                    submitBtn.innerText = 'Submit Registration';
                }

            } catch (e) {
                console.error(e);
                showMsg('Failed to connect to server.', 'error');
                submitBtn.disabled = false;
                submitBtn.innerText = 'Submit Registration';
            }
        }

        function showMsg(text, type) {
            msgEl.innerText = text;
            msgEl.className = 'message ' + type;
        }

        // Boot up
        window.addEventListener('load', loadModels);
    </script>
</body>

</html>
