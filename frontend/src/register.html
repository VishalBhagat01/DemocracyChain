<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>VoteChain — Biometric Registration</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800&display=swap" rel="stylesheet" />
    <script defer src="https://cdn.jsdelivr.net/npm/face-api.js@0.22.2/dist/face-api.min.js"></script>
    <script>
      tailwind.config = {
        theme: {
          extend: {
            fontFamily: { sans: ['Inter', 'sans-serif'] },
            colors: {
              primary: { 600: '#0069c8', 700: '#0154a2' },
              surface: { 50: '#fafaf9', 200: '#e7e5e2', 300: '#d5d2cd', 500: '#716d66', 800: '#27251f' }
            },
            boxShadow: { card: '0 1px 2px -1px rgb(0 0 0 / 0.08), 0 2px 4px 0 rgb(0 0 0 / 0.04)' }
          }
        }
      }
    </script>
    <style>
        .video-container {
            position: relative;
            width: 100%;
            height: 280px;
            background: #000;
            border-radius: 16px;
            overflow: hidden;
            margin-bottom: 20px;
            border: 1px solid #e7e5e2;
        }
        video {
            width: 100%;
            height: 100%;
            object-fit: cover;
            transform: scaleX(-1);
        }
        canvas {
            position: absolute;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            z-index: 10;
        }
    </style>
</head>
<body class="bg-surface-50 min-h-screen flex items-center justify-center p-5 font-sans antialiased text-surface-800">
    <div class="bg-white border border-surface-200 rounded-2xl shadow-card p-10 w-full max-w-4xl flex flex-col md:flex-row gap-10">
        <div class="flex-1">
            <h1 class="text-3xl font-extrabold mb-2 text-surface-800">Register to Vote</h1>
            <p class="text-sm text-surface-500 mb-8 font-medium">Create your biometric identity to cast votes securely.</p>

            <label class="block text-xs font-semibold uppercase tracking-wide mb-2 text-surface-800">Voter ID</label>
            <input type="text" id="voter_id" placeholder="Create a unique ID (e.g. adhaar_1234)" class="w-full bg-white border border-surface-300 rounded-xl px-4 py-3 mb-4 focus:outline-none focus:border-primary-600 focus:ring-2 focus:ring-primary-600/20">

            <label class="block text-xs font-semibold uppercase tracking-wide mb-2 text-surface-800">Full Name</label>
            <input type="text" id="full_name" placeholder="John Doe" class="w-full bg-white border border-surface-300 rounded-xl px-4 py-3 mb-4 focus:outline-none focus:border-primary-600 focus:ring-2 focus:ring-primary-600/20">

            <label class="block text-xs font-semibold uppercase tracking-wide mb-2 text-surface-800">Email</label>
            <input type="email" id="email" placeholder="john@example.com" class="w-full bg-white border border-surface-300 rounded-xl px-4 py-3 mb-4 focus:outline-none focus:border-primary-600 focus:ring-2 focus:ring-primary-600/20">

            <label class="block text-xs font-semibold uppercase tracking-wide mb-2 text-surface-800">Password</label>
            <input type="password" id="password" placeholder="Create a strong password" class="w-full bg-white border border-surface-300 rounded-xl px-4 py-3 mb-4 focus:outline-none focus:border-primary-600 focus:ring-2 focus:ring-primary-600/20">

            <label class="block text-xs font-semibold uppercase tracking-wide mb-2 text-surface-800">Voting Booth</label>
            <select id="booth_id" class="w-full bg-white border border-surface-300 rounded-xl px-4 py-3 mb-6 focus:outline-none focus:border-primary-600 focus:ring-2 focus:ring-primary-600/20 text-surface-800">
                <option value="">-- Select your designated booth --</option>
                <option value="BOOTH_001">Booth 1 — North Zone</option>
                <option value="BOOTH_002">Booth 2 — South Zone</option>
                <option value="BOOTH_003">Booth 3 — East Zone</option>
                <option value="BOOTH_004">Booth 4 — West Zone</option>
                <option value="BOOTH_005">Booth 5 — Central Zone</option>
                <option value="BOOTH_006">Booth 6 — Outer Zone</option>
            </select>

            <a href="/" class="text-sm text-primary-600 hover:text-primary-700 font-medium">← Back to Login</a>
        </div>

        <div class="flex-1 flex flex-col" id="cameraColumn">
            <div class="video-container" id="videoContainer">
                <video id="video" autoplay muted playsinline></video>
                <div class="absolute top-3 right-3 bg-white/90 backdrop-blur border border-surface-200 shadow-sm px-3 py-1.5 rounded-full text-xs font-semibold text-surface-800 z-20 flex items-center gap-2" id="statusBadge">
                    <div class="w-2 h-2 rounded-full bg-amber-500" id="statusDot"></div>
                    <span id="statusText">Loading AI Models...</span>
                </div>
            </div>

            <button id="captureBtn" disabled onclick="captureFace()" class="w-full bg-white border border-surface-300 hover:bg-surface-50 text-surface-800 font-semibold rounded-xl py-3.5 mb-3 transition-colors disabled:opacity-50 disabled:cursor-not-allowed">
              Take Face Scan
            </button>
            <button id="submitBtn" disabled onclick="submitRegistration()" class="w-full bg-primary-600 hover:bg-primary-700 text-white font-semibold rounded-xl py-3.5 transition-colors disabled:opacity-50 disabled:cursor-not-allowed">
              Submit Registration
            </button>
            <div id="msg" class="text-sm mt-3 text-center font-medium"></div>
        </div>
    </div>

    <script>
        const video = document.getElementById('video');
        const videoContainer = document.getElementById('videoContainer');
        const captureBtn = document.getElementById('captureBtn');
        const submitBtn = document.getElementById('submitBtn');
        const msgEl = document.getElementById('msg');
        const statusText = document.getElementById('statusText');
        const statusDot = document.getElementById('statusDot');

        let currentEmbedding = null;
        let modelsLoaded = false;
        let isDetecting = false;

        async function loadModels() {
            try {
                await Promise.all([
                    faceapi.nets.ssdMobilenetv1.loadFromUri('/models'),
                    faceapi.nets.faceLandmark68Net.loadFromUri('/models'),
                    faceapi.nets.faceRecognitionNet.loadFromUri('/models')
                ]);
                modelsLoaded = true;
                statusText.innerText = 'Starting Camera...';
                startVideo();
            } catch (err) {
                console.error("Model load error:", err);
                showMsg('Failed to load face detection models.', 'error');
                statusDot.className = 'w-2 h-2 rounded-full bg-red-500';
                statusText.innerText = 'Error';
            }
        }

        function startVideo() {
            navigator.mediaDevices.getUserMedia({ video: { width: 400, height: 300 } })
                .then(stream => {
                    video.srcObject = stream;
                })
                .catch(err => {
                    console.error(err);
                    showMsg('Camera access denied or unavailable.', 'error');
                    statusDot.className = 'w-2 h-2 rounded-full bg-red-500';
                    statusText.innerText = 'No Camera';
                });
        }

        video.addEventListener('play', () => {
            const canvas = faceapi.createCanvasFromMedia(video);
            videoContainer.appendChild(canvas);
            const displaySize = { width: videoContainer.clientWidth, height: videoContainer.clientHeight };
            faceapi.matchDimensions(canvas, displaySize);

            statusDot.className = 'w-2 h-2 rounded-full bg-green-500';
            statusText.innerText = 'Ready';
            captureBtn.disabled = false;
            captureBtn.innerText = 'Scan Face';

            setInterval(async () => {
                if (!modelsLoaded) return;
                isDetecting = true;
                const detections = await faceapi.detectSingleFace(video).withFaceLandmarks();
                const ctx = canvas.getContext('2d');
                ctx.clearRect(0, 0, canvas.width, canvas.height);

                if (detections) {
                    const resizedDetections = faceapi.resizeResults(detections, displaySize);
                    ctx.save();
                    ctx.translate(canvas.width, 0);
                    ctx.scale(-1, 1);
                    faceapi.draw.drawDetections(canvas, resizedDetections);
                    faceapi.draw.drawFaceLandmarks(canvas, resizedDetections);
                    ctx.restore();

                    if (statusText.innerText === 'Ready') {
                        statusText.innerText = 'Face Detected';
                        statusDot.className = 'w-2 h-2 rounded-full bg-green-500';
                    }
                } else {
                    if (statusText.innerText === 'Face Detected') {
                        statusText.innerText = 'Ready';
                    }
                }
                isDetecting = false;
            }, 150);
        });

        async function captureFace() {
            if (isDetecting) {
                showMsg('Processing... please wait a moment.', '');
                setTimeout(captureFace, 200);
                return;
            }

            captureBtn.innerText = 'Scanning... Hold still';
            captureBtn.disabled = true;
            msgEl.innerText = '';

            try {
                const detection = await faceapi.detectSingleFace(video).withFaceLandmarks().withFaceDescriptor();

                if (!detection) {
                    showMsg('No face detected. Please ensure you are clearly visible.', 'error');
                    captureBtn.disabled = false;
                    captureBtn.innerText = 'Try Again';
                    return;
                }

                currentEmbedding = Array.from(detection.descriptor);
                captureBtn.className = 'w-full bg-green-50 border border-green-200 hover:bg-green-100 text-green-700 font-semibold rounded-xl py-3.5 mb-3 transition-colors';
                captureBtn.innerText = '✓ Face Scan Complete';
                submitBtn.disabled = false;
                showMsg('Biometric data captured successfully!', 'success');

            } catch (err) {
                console.error(err);
                showMsg('Error capturing face.', 'error');
                captureBtn.disabled = false;
                captureBtn.innerText = 'Try Again';
            }
        }

        async function submitRegistration() {
            const voter_id = document.getElementById('voter_id').value.trim();
            const full_name = document.getElementById('full_name').value.trim();
            const email = document.getElementById('email').value.trim();
            const password = document.getElementById('password').value;
            const booth_id = document.getElementById('booth_id').value;

            if (!voter_id || !full_name || !password) {
                showMsg('Please fill in all required text fields.', 'error');
                return;
            }
            if (!booth_id) {
                showMsg('Please select your designated voting booth.', 'error');
                return;
            }
            if (!currentEmbedding) {
                showMsg('Please complete the face scan first.', 'error');
                return;
            }

            submitBtn.disabled = true;
            submitBtn.innerText = 'Submitting...';

            try {
                const payload = {
                    voter_id, password, full_name, email,
                    face_embedding: currentEmbedding,
                    booth_id
                };

                const res = await fetch('/api/register', {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify(payload)
                });

                const data = await res.json();

                if (res.ok) {
                    document.querySelector('.bg-white').innerHTML = `
                        <div class="text-center w-full py-16">
                            <div class="text-6xl mb-6">✅</div>
                            <h2 class="text-2xl font-bold text-surface-800 mb-3">Registration Submitted</h2>
                            <p class="text-surface-500 mb-8 max-w-sm mx-auto">
                                Your biometric profile has been created.<br>
                                Please wait for an Election Administrator to approve your account.
                            </p>
                            <a href="/" class="inline-block px-6 py-3 bg-primary-600 hover:bg-primary-700 text-white font-semibold rounded-xl transition-colors">Return to Login</a>
                        </div>
                    `;
                    if (video.srcObject) {
                        video.srcObject.getTracks().forEach(track => track.stop());
                    }
                } else {
                    showMsg(data.error || 'Server rejected registration.', 'error');
                    submitBtn.disabled = false;
                    submitBtn.innerText = 'Submit Registration';
                }
            } catch (e) {
                console.error(e);
                showMsg('Failed to connect to server.', 'error');
                submitBtn.disabled = false;
                submitBtn.innerText = 'Submit Registration';
            }
        }

        function showMsg(text, type) {
            msgEl.innerText = text;
            if (type === 'error') {
                msgEl.className = 'text-sm mt-3 text-center text-red-500 font-medium';
            } else if (type === 'success') {
                msgEl.className = 'text-sm mt-3 text-center text-green-600 font-medium';
            } else {
                msgEl.className = 'text-sm mt-3 text-center text-surface-500 font-medium';
            }
        }

        window.addEventListener('load', loadModels);
    </script>
</body>
</html>
