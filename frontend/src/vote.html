<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>VoteChain — Cast Your Vote</title>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;600;700;900&display=swap"
        rel="stylesheet" />
    <script defer src="https://cdn.jsdelivr.net/npm/face-api.js@0.22.2/dist/face-api.min.js"></script>
    <style>
        *,
        *::before,
        *::after {
            box-sizing: border-box;
            margin: 0;
            padding: 0;
        }

        body {
            font-family: 'Inter', sans-serif;
            min-height: 100vh;
            background: linear-gradient(135deg, #0f0c29 0%, #1a1a4e 50%, #24243e 100%);
            color: #fff;
            padding: 40px 20px;
        }

        .header {
            max-width: 800px;
            margin: 0 auto 40px;
            display: flex;
            align-items: center;
            justify-content: space-between;
        }

        .logo {
            font-size: 22px;
            font-weight: 800;
            display: flex;
            align-items: center;
            gap: 10px;
        }

        .logo span {
            font-size: 28px;
        }

        #voterBadge {
            font-size: 12px;
            color: rgba(255, 255, 255, 0.5);
            background: rgba(255, 255, 255, 0.07);
            padding: 6px 14px;
            border-radius: 30px;
            border: 1px solid rgba(255, 255, 255, 0.1);
        }

        .container {
            max-width: 800px;
            margin: 0 auto;
        }

        .selector-panel {
            background: rgba(255, 255, 255, 0.05);
            border: 1px solid rgba(255, 255, 255, 0.1);
            border-radius: 16px;
            padding: 20px;
            margin-bottom: 24px;
            display: flex;
            align-items: center;
            justify-content: space-between;
            gap: 20px;
        }

        select {
            flex: 1;
            background: rgba(255, 255, 255, 0.1);
            border: 1px solid rgba(255, 255, 255, 0.2);
            border-radius: 10px;
            padding: 12px;
            color: #fff;
            font-family: inherit;
            outline: none;
        }

        select option {
            background: #1a1a4e;
        }

        .election-info {
            background: linear-gradient(135deg, rgba(108, 99, 255, 0.2), rgba(59, 28, 183, 0.1));
            border: 1px solid rgba(108, 99, 255, 0.3);
            border-radius: 20px;
            padding: 28px 32px;
            margin-bottom: 32px;
        }

        .election-info h1 {
            font-size: 26px;
            font-weight: 800;
            margin-bottom: 6px;
        }

        .election-info .dates {
            font-size: 13px;
            color: rgba(255, 255, 255, 0.6);
            margin-top: 8px;
        }

        .status-badge {
            display: inline-block;
            background: rgba(0, 212, 100, 0.15);
            color: #00d464;
            border: 1px solid rgba(0, 212, 100, 0.3);
            border-radius: 30px;
            padding: 4px 12px;
            font-size: 12px;
            font-weight: 600;
            margin-bottom: 12px;
        }

        .section-title {
            font-size: 14px;
            font-weight: 700;
            color: rgba(255, 255, 255, 0.7);
            text-transform: uppercase;
            letter-spacing: 1px;
            margin-bottom: 16px;
        }

        .candidate-grid {
            display: grid;
            gap: 14px;
            margin-bottom: 32px;
        }

        .candidate-card {
            background: rgba(255, 255, 255, 0.04);
            border: 2px solid rgba(255, 255, 255, 0.08);
            border-radius: 16px;
            padding: 20px 24px;
            cursor: pointer;
            transition: all .2s;
            display: flex;
            align-items: center;
            gap: 20px;
        }

        .candidate-card:hover {
            border-color: rgba(108, 99, 255, 0.5);
            background: rgba(108, 99, 255, 0.08);
            transform: translateY(-2px);
        }

        .candidate-card.selected {
            border-color: #6c63ff;
            background: rgba(108, 99, 255, 0.15);
            box-shadow: 0 0 0 3px rgba(108, 99, 255, 0.2);
        }

        .candidate-avatar {
            width: 52px;
            height: 52px;
            border-radius: 50%;
            background: linear-gradient(135deg, #6c63ff, #3b1cb7);
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: 22px;
            flex-shrink: 0;
        }

        .candidate-info h3 {
            font-size: 17px;
            font-weight: 700;
        }

        .candidate-info p {
            font-size: 13px;
            color: rgba(255, 255, 255, 0.55);
            margin-top: 3px;
        }

        .vote-btn {
            width: 100%;
            padding: 18px;
            background: linear-gradient(135deg, #6c63ff, #3b1cb7);
            color: #fff;
            border: none;
            border-radius: 16px;
            font-size: 17px;
            font-weight: 700;
            font-family: inherit;
            cursor: pointer;
            transition: all .2s;
        }

        .vote-btn:hover:not(:disabled) {
            transform: translateY(-2px);
            box-shadow: 0 8px 32px rgba(108, 99, 255, 0.5);
        }

        .vote-btn:disabled {
            opacity: 0.5;
            cursor: not-allowed;
        }

        .status-box {
            margin-top: 24px;
            padding: 20px 24px;
            border-radius: 16px;
            font-size: 14px;
            line-height: 1.6;
            animation: fadeIn .3s ease;
        }

        .status-box.success {
            background: rgba(0, 212, 100, 0.1);
            border: 1px solid rgba(0, 212, 100, 0.3);
            color: #00d464;
        }

        .status-box.error {
            background: rgba(255, 93, 93, 0.1);
            border: 1px solid rgba(255, 93, 93, 0.3);
            color: #ff5d5d;
        }

        .status-box.info {
            background: rgba(108, 99, 255, 0.1);
            border: 1px solid rgba(108, 99, 255, 0.3);
            color: #a09af8;
        }

        @keyframes fadeIn {
            from {
                opacity: 0;
                transform: translateY(8px);
            }

            to {
                opacity: 1;
                transform: none;
            }
        }

        .tx-code {
            font-family: monospace;
            font-size: 12px;
            background: rgba(0, 0, 0, 0.3);
            padding: 10px 14px;
            border-radius: 8px;
            margin-top: 10px;
            word-break: break-all;
            color: rgba(255, 255, 255, 0.8);
        }

        .video-container {
            position: relative;
            width: 100%;
            height: 320px;
            background: #000;
            border-radius: 16px;
            overflow: hidden;
            margin-top: 24px;
            margin-bottom: 24px;
            border: 2px solid rgba(255, 255, 255, 0.1);
            display: none;
        }

        .video-container video {
            width: 100%;
            height: 100%;
            object-fit: cover;
            transform: scaleX(-1);
        }

        .video-container canvas {
            position: absolute;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            z-index: 10;
        }
    </style>
</head>

<body>
    <div class="header">
        <div class="logo"><span>🗳️</span> VoteChain</div>
        <span id="voterBadge">Authenticating...</span>
    </div>

    <div class="container">
        <!-- GLOBAL SESSION SELECTOR -->
        <div class="selector-panel" id="sessionSelectorPanel" style="display:none">
            <span style="font-weight: 700; color: #6c63ff;">Voting Session:</span>
            <select id="electionIdSelect" onchange="loadElectionData()">
                <option value="">Loading active sessions...</option>
            </select>
        </div>

        <div id="loading" style="text-align: center; padding: 60px;">
            <div
                style="width: 32px; height: 32px; border: 3px solid #3b1cb7; border-top-color: #6c63ff; border-radius: 50%; animation: spin .8s linear infinite; margin: 0 auto 12px;">
            </div>
            Loading blockchain...
        </div>

        <div id="main" style="display:none">
            <div class="election-info">
                <div class="status-badge" id="statusBadge">● Active</div>
                <h1 id="electionName">–</h1>
                <div class="dates" id="electionDates">–</div>
            </div>

            <div class="section-title">Select a Candidate</div>
            <div class="candidate-grid" id="candidateGrid"></div>

            <button class="vote-btn" id="prepareVoteBtn" onclick="prepareBiometricVote()">Verify Identity and
                Vote</button>

            <div id="facePrompt" style="display:none; text-align: center; margin-top: 20px;">
                <h3 style="margin-bottom: 8px;">Verify Biometric Signature</h3>
                <p style="color: rgba(255,255,255,0.7); font-size: 14px;">Please center your face in the frame.</p>
                <div class="video-container" id="videoContainer">
                    <video id="video" autoplay muted playsinline></video>
                </div>
                <button class="vote-btn" id="voteBtn" style="background: linear-gradient(135deg, #00ca4e, #009838);"
                    disabled onclick="castVote()">Take Scan &amp; Cast Vote</button>
            </div>

            <div id="msg"></div>
        </div>
    </div>

    <script src="https://cdn.jsdelivr.net/npm/web3@4/dist/web3.min.js"></script>
    <script>
        const EMOJIS = ['🦁', '🦊', '🐺', '🦅', '🌟', '🔥', '⚡', '🌊'];
        let contract, selectedCandidate = null, voterToken = null;
        let modelsLoaded = false, isDetecting = false, videoStream = null;

        async function init() {
            const resp = await fetch('/contract.json');
            const info = await resp.json();
            const web3 = new Web3(new Web3.providers.HttpProvider('http://127.0.0.1:8545'));
            contract = new web3.eth.Contract(info.abi, info.address);

            // Get JWT
            const tokenMatch = window.location.search.match(/Authorization=Bearer%20([^&]+)/);
            if (!tokenMatch) { window.location.href = '/'; return; }
            voterToken = decodeURIComponent(tokenMatch[1]);

            // Identity info
            const meRes = await fetch('/api/me', { headers: { 'Authorization': `Bearer ${voterToken}` } });
            const meData = await meRes.json();
            document.getElementById('voterBadge').textContent = '👤 ' + meData.full_name;

            // Load sessions
            const ids = await contract.methods.getElectionIds().call();
            const select = document.getElementById('electionIdSelect');
            select.innerHTML = '';

            if (ids.length === 0) {
                document.getElementById('loading').innerHTML = '❌ No active voting sessions found.';
                return;
            }

            ids.forEach(id => {
                const opt = document.createElement('option');
                opt.value = id;
                opt.textContent = id;
                select.appendChild(opt);
            });

            document.getElementById('sessionSelectorPanel').style.display = 'flex';
            loadElectionData();

            // Background load models
            Promise.all([
                faceapi.nets.ssdMobilenetv1.loadFromUri('/models'),
                faceapi.nets.faceLandmark68Net.loadFromUri('/models'),
                faceapi.nets.faceRecognitionNet.loadFromUri('/models')
            ]).then(() => { modelsLoaded = true; });
        }

        async function loadElectionData() {
            const electionId = document.getElementById('electionIdSelect').value;
            if (!electionId) return;

            document.getElementById('main').style.display = 'none';
            document.getElementById('loading').style.display = 'block';
            document.getElementById('msg').innerHTML = '';
            selectedCandidate = null;

            try {
                const e = await contract.methods.getElection(electionId).call();
                document.getElementById('electionName').textContent = e[1];
                const s = new Date(Number(e[2]) * 1000).toLocaleDateString();
                const d = new Date(Number(e[3]) * 1000).toLocaleDateString();
                document.getElementById('electionDates').textContent = `Session: ${s} to ${d}`;

                const count = Number(await contract.methods.getCandidateCount(electionId).call());
                const grid = document.getElementById('candidateGrid');
                grid.innerHTML = '';

                for (let i = 1; i <= count; i++) {
                    const c = await contract.methods.getCandidate(electionId, i).call();
                    if (Number(c[0]) === 0) continue; // Skip deleted candidates
                    const card = document.createElement('div');
                    card.className = 'candidate-card';
                    card.innerHTML = `
                        <div class="candidate-avatar">${EMOJIS[(i - 1) % EMOJIS.length]}</div>
                        <div class="candidate-info"><h3>${c[1]}</h3><p>${c[2]}</p></div>
                    `;
                    card.onclick = () => {
                        document.querySelectorAll('.candidate-card').forEach(el => el.classList.remove('selected'));
                        card.classList.add('selected');
                        selectedCandidate = Number(c[0]);
                    };
                    grid.appendChild(card);
                }

                document.getElementById('loading').style.display = 'none';
                document.getElementById('main').style.display = 'block';
                document.getElementById('prepareVoteBtn').style.display = 'block';
                document.getElementById('facePrompt').style.display = 'none';

            } catch (err) { console.error(err); }
        }

        async function prepareBiometricVote() {
            if (!selectedCandidate) { alert('Please select a candidate.'); return; }
            if (!modelsLoaded) { alert('Verifying biometric engine status... please wait.'); return; }

            document.getElementById('prepareVoteBtn').style.display = 'none';
            document.getElementById('facePrompt').style.display = 'block';
            document.getElementById('videoContainer').style.display = 'block';

            const video = document.getElementById('video');
            navigator.mediaDevices.getUserMedia({ video: true }).then(stream => {
                videoStream = stream;
                video.srcObject = stream;
            });

            video.onplay = () => {
                const canvas = faceapi.createCanvasFromMedia(video);
                document.getElementById('videoContainer').appendChild(canvas);
                faceapi.matchDimensions(canvas, { width: video.clientWidth, height: video.clientHeight });

                document.getElementById('voteBtn').disabled = false;

                setInterval(async () => {
                    const dets = await faceapi.detectSingleFace(video).withFaceLandmarks();
                    const ctx = canvas.getContext('2d');
                    ctx.clearRect(0, 0, canvas.width, canvas.height);
                    if (dets) {
                        const resized = faceapi.resizeResults(dets, { width: canvas.width, height: canvas.height });
                        faceapi.draw.drawDetections(canvas, resized);
                    }
                }, 200);
            };
        }

        async function castVote() {
            const btn = document.getElementById('voteBtn');
            btn.disabled = true;
            btn.textContent = 'Analyzing Biometrics...';

            try {
                const det = await faceapi.detectSingleFace(document.getElementById('video')).withFaceLandmarks().withFaceDescriptor();
                if (!det) { alert('Face not detected. Stand still.'); btn.disabled = false; return; }

                const res = await fetch('/api/cast-vote', {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json', 'Authorization': `Bearer ${voterToken}` },
                    body: JSON.stringify({
                        electionId: document.getElementById('electionIdSelect').value,
                        candidateId: selectedCandidate,
                        face_embedding: Array.from(det.descriptor)
                    })
                });

                const data = await res.json();
                if (res.ok) {
                    if (videoStream) videoStream.getTracks().forEach(t => t.stop());
                    document.getElementById('facePrompt').style.display = 'none';
                    document.getElementById('msg').innerHTML = `<div class="status-box success">🏆 <strong>Vote Recorded!</strong><br><div class="tx-code">TX: ${data.transactionHash}</div></div>`;
                } else {
                    alert(data.error);
                    btn.disabled = false;
                }
            } catch (e) { alert(e.message); btn.disabled = false; }
        }

        window.onload = init;
    </script>
    <style>
        @keyframes spin {
            to {
                transform: rotate(360deg);
            }
        }
    </style>
</body>

</html>
