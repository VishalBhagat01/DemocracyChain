<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>VoteChain — Results</title>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;600;700;900&display=swap"
        rel="stylesheet" />
    <style>
        *,
        *::before,
        *::after {
            box-sizing: border-box;
            margin: 0;
            padding: 0;
        }

        body {
            font-family: 'Inter', sans-serif;
            min-height: 100vh;
            background: linear-gradient(135deg, #0f0c29 0%, #1a1a4e 50%, #24243e 100%);
            color: #fff;
            padding: 40px 20px;
        }

        .header {
            max-width: 900px;
            margin: 0 auto 40px;
            display: flex;
            justify-content: space-between;
            align-items: center;
        }

        .logo {
            font-size: 22px;
            font-weight: 800;
            display: flex;
            align-items: center;
            gap: 10px;
        }

        .container {
            max-width: 900px;
            margin: 0 auto;
        }

        .selector-panel {
            background: rgba(255, 255, 255, 0.05);
            border: 1px solid rgba(255, 255, 255, 0.1);
            border-radius: 16px;
            padding: 20px;
            margin-bottom: 24px;
            display: flex;
            align-items: center;
            justify-content: space-between;
            gap: 20px;
        }

        select {
            flex: 1;
            background: rgba(255, 255, 255, 0.1);
            border: 1px solid rgba(255, 255, 255, 0.2);
            border-radius: 10px;
            padding: 12px;
            color: #fff;
            font-family: inherit;
            outline: none;
        }

        select option {
            background: #1a1a4e;
        }

        h1 {
            font-size: 28px;
            font-weight: 900;
            margin-bottom: 8px;
        }

        .sub {
            color: rgba(255, 255, 255, 0.5);
            font-size: 14px;
            margin-bottom: 36px;
        }

        .stats-grid {
            display: grid;
            grid-template-columns: repeat(3, 1fr);
            gap: 16px;
            margin-bottom: 40px;
        }

        .stat-card {
            background: rgba(255, 255, 255, 0.05);
            border: 1px solid rgba(255, 255, 255, 0.1);
            border-radius: 16px;
            padding: 24px;
            text-align: center;
        }

        .stat-card .num {
            font-size: 36px;
            font-weight: 900;
            color: #6c63ff;
        }

        .stat-card .lbl {
            font-size: 13px;
            color: rgba(255, 255, 255, 0.5);
            margin-top: 4px;
        }

        .results-list {
            display: grid;
            gap: 16px;
        }

        .result-card {
            background: rgba(255, 255, 255, 0.04);
            border: 1px solid rgba(255, 255, 255, 0.08);
            border-radius: 20px;
            padding: 24px 28px;
        }

        .result-card.winner {
            border-color: rgba(255, 215, 0, 0.4);
            background: rgba(255, 215, 0, 0.05);
        }

        .result-header {
            display: flex;
            align-items: center;
            gap: 16px;
            margin-bottom: 16px;
        }

        .rank {
            width: 36px;
            height: 36px;
            border-radius: 50%;
            background: rgba(108, 99, 255, 0.2);
            display: flex;
            align-items: center;
            justify-content: center;
            font-weight: 800;
            font-size: 16px;
            flex-shrink: 0;
        }

        .rank.gold {
            background: rgba(255, 215, 0, 0.2);
            color: #ffd700;
        }

        .candidate-name {
            font-size: 18px;
            font-weight: 700;
        }

        .candidate-party {
            font-size: 13px;
            color: rgba(255, 255, 255, 0.5);
            margin-top: 2px;
        }

        .vote-info {
            margin-left: auto;
            text-align: right;
        }

        .vote-info .votes {
            font-size: 24px;
            font-weight: 800;
            color: #6c63ff;
        }

        .vote-info .pct {
            font-size: 13px;
            color: rgba(255, 255, 255, 0.5);
        }

        .bar-track {
            background: rgba(255, 255, 255, 0.08);
            border-radius: 99px;
            height: 8px;
            overflow: hidden;
        }

        .bar-fill {
            height: 100%;
            border-radius: 99px;
            background: linear-gradient(90deg, #6c63ff, #3b1cb7);
            transition: width 1s ease;
        }

        .bar-fill.gold {
            background: linear-gradient(90deg, #ffd700, #ff9500);
        }

        #loading {
            text-align: center;
            padding: 80px;
            color: rgba(255, 255, 255, 0.4);
        }

        .spinner {
            display: inline-block;
            width: 36px;
            height: 36px;
            border: 3px solid rgba(108, 99, 255, 0.3);
            border-top-color: #6c63ff;
            border-radius: 50%;
            animation: spin .8s linear infinite;
            margin-bottom: 12px;
        }

        @keyframes spin {
            to {
                transform: rotate(360deg);
            }
        }
    </style>
</head>

<body>
    <div class="header">
        <div class="logo">🗳️ VoteChain</div>
        <button class="nav-links" style="background:none; border:none; color:rgba(255,255,255,0.6); cursor:pointer;"
            onclick="loadResults()">🔄 Sync</button>
    </div>

    <div class="container">
        <!-- SESSION SELECTOR -->
        <div class="selector-panel">
            <span style="font-weight: 700; color: #6c63ff;">Session Results:</span>
            <select id="electionIdSelect" onchange="loadResults()">
                <option value="">Loading sessions...</option>
            </select>
        </div>

        <h1>Election Standings</h1>
        <p class="sub" id="electionSub">Historical and Live Blockchain Data</p>

        <div id="loading">
            <div class="spinner"></div><br>Reading block data...
        </div>

        <div id="main" style="display:none">
            <div class="stats-grid">
                <div class="stat-card">
                    <div class="num" id="totalVotes">0</div>
                    <div class="lbl">Total Votes</div>
                </div>
                <div class="stat-card">
                    <div class="num" id="totalCandidates">0</div>
                    <div class="lbl">Candidates</div>
                </div>
                <div class="stat-card">
                    <div class="num" id="electionStatus">Active</div>
                    <div class="lbl">Status</div>
                </div>
            </div>
            <div class="results-list" id="resultsList"></div>
        </div>
    </div>

    <script src="https://cdn.jsdelivr.net/npm/web3@4/dist/web3.min.js"></script>
    <script>
        const EMOJIS = ['🦁', '🦊', '🐺', '🦅', '🌟', '🔥', '⚡', '🌊'];
        let contract;

        async function init() {
            const resp = await fetch('/contract.json');
            const info = await resp.json();
            const web3 = new Web3(new Web3.providers.HttpProvider('http://127.0.0.1:8545'));
            contract = new web3.eth.Contract(info.abi, info.address);

            // Fetch IDs
            const ids = await contract.methods.getElectionIds().call();
            const select = document.getElementById('electionIdSelect');
            select.innerHTML = '';

            if (ids.length === 0) {
                document.getElementById('loading').innerHTML = 'No sessions found on chain.';
                return;
            }

            ids.reverse().forEach(id => {
                const opt = document.createElement('option');
                opt.value = id;
                opt.textContent = id;
                select.appendChild(opt);
            });

            loadResults();
        }

        async function loadResults() {
            const electionId = document.getElementById('electionIdSelect').value;
            if (!electionId) return;

            document.getElementById('loading').style.display = 'block';
            document.getElementById('main').style.display = 'none';

            try {
                const elec = await contract.methods.getElection(electionId).call();
                const now = Date.now() / 1000;
                const isActive = now >= Number(elec[2]) && now <= Number(elec[3]);

                document.getElementById('electionSub').textContent = elec[1];
                document.getElementById('electionStatus').textContent = isActive ? 'Active' : 'Closed';

                const count = Number(await contract.methods.getCandidateCount(electionId).call());
                document.getElementById('totalCandidates').textContent = count;

                let candidates = [];
                let total = 0;
                for (let i = 1; i <= count; i++) {
                    const c = await contract.methods.getCandidate(electionId, i).call();
                    if (Number(c[0]) === 0) continue; // Skip deleted candidates
                    const votes = Number(c[3]);
                    candidates.push({ id: Number(c[0]), name: c[1], party: c[2], votes });
                    total += votes;
                }
                document.getElementById('totalVotes').textContent = total;
                candidates.sort((a, b) => b.votes - a.votes);

                const list = document.getElementById('resultsList');
                list.innerHTML = '';
                candidates.forEach((c, idx) => {
                    const pct = total > 0 ? ((c.votes / total) * 100).toFixed(1) : 0;
                    const isWinner = idx === 0 && total > 0;
                    const div = document.createElement('div');
                    div.className = 'result-card' + (isWinner ? ' winner' : '');
                    div.innerHTML = `
                        <div class="result-header">
                            <div class="rank ${isWinner ? 'gold' : ''}">${isWinner ? '🏆' : idx + 1}</div>
                            <div class="candidate-info"><div class="candidate-name">${EMOJIS[(c.id - 1) % EMOJIS.length]} ${c.name}</div><div class="candidate-party">${c.party}</div></div>
                            <div class="vote-info"><div class="votes">${c.votes}</div><div class="pct">${pct}%</div></div>
                        </div>
                        <div class="bar-track"><div class="bar-fill ${isWinner ? 'gold' : ''}" style="width:${pct}%"></div></div>
                    `;
                    list.appendChild(div);
                });

                document.getElementById('loading').style.display = 'none';
                document.getElementById('main').style.display = 'block';
            } catch (err) { console.error(err); }
        }

        window.onload = init;
    </script>
</body>

</html>
