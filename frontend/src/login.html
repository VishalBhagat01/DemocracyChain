<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <title>Ethereum Voting — Login</title>
  <script src="https://cdn.tailwindcss.com"></script>
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800&display=swap" rel="stylesheet" />
  <script>
    tailwind.config = {
      theme: {
        extend: {
          fontFamily: { sans: ['Inter', 'sans-serif'] },
          colors: {
            primary: { 600: '#0069c8', 700: '#0154a2' },
            surface: { 50: '#fafaf9', 200: '#e7e5e2', 300: '#d5d2cd', 500: '#716d66', 800: '#27251f' }
          },
          boxShadow: { card: '0 1px 2px -1px rgb(0 0 0 / 0.08), 0 2px 4px 0 rgb(0 0 0 / 0.04)' }
        }
      }
    }
  </script>
</head>
<body class="bg-surface-50 min-h-screen flex items-center justify-center font-sans antialiased p-4">
  <div class="bg-white border border-surface-200 rounded-2xl shadow-card p-10 w-full max-w-md">
    <div class="flex items-center gap-3 mb-8">
      <div class="w-12 h-12 bg-primary-600 rounded-xl flex items-center justify-center text-xl text-white">🗳️</div>
      <div>
        <div class="text-xl font-bold text-surface-800">VoteChain</div>
        <div class="text-xs text-surface-500 mt-0.5">Decentralized Voting on Ethereum</div>
      </div>
    </div>
    
    <h1 class="text-2xl font-extrabold text-surface-800 mb-2">Welcome back</h1>
    <p class="text-sm text-surface-500 mb-8">Sign in to access the voting portal</p>
    
    <label class="block text-xs font-semibold text-surface-800 uppercase tracking-wide mb-2">Voter ID</label>
    <input type="text" id="voter_id" class="w-full bg-white border border-surface-300 rounded-xl px-4 py-3 text-surface-800 mb-5 focus:outline-none focus:border-primary-600 focus:ring-2 focus:ring-primary-600/20" placeholder="e.g. adhaar_1234">
    
    <label class="block text-xs font-semibold text-surface-800 uppercase tracking-wide mb-2">Password</label>
    <input type="password" id="password" class="w-full bg-white border border-surface-300 rounded-xl px-4 py-3 text-surface-800 mb-5 focus:outline-none focus:border-primary-600 focus:ring-2 focus:ring-primary-600/20" placeholder="••••••••">
    
    <p class="text-red-500 text-sm mb-4 hidden font-medium" id="err">Invalid credentials. Please try again.</p>
    
    <button id="loginBtn" onclick="login()" class="w-full bg-primary-600 hover:bg-primary-700 text-white font-semibold rounded-xl py-3.5 transition-colors mt-1">Sign In →</button>
    
    <button class="w-full bg-white border border-surface-200 hover:bg-surface-50 text-surface-800 font-semibold rounded-xl py-3.5 mt-3 transition-colors" onclick="window.location.href='/register'">Register New Voter</button>
    
    <div class="text-center mt-8 text-xs text-surface-500 font-medium">
      Secured by Ethereum Blockchain &bull; <a href="https://ethereum.org" target="_blank" class="text-primary-600 hover:underline">Learn more</a>
    </div>
  </div>

  <script>
    async function login() {
      const voter_id = document.getElementById('voter_id').value.trim();
      const password = document.getElementById('password').value;
      const errEl = document.getElementById('err');
      errEl.classList.add('hidden');
      if (!voter_id || !password) { errEl.textContent = 'Please enter both fields.'; errEl.classList.remove('hidden'); return; }

      try {
        const res = await fetch('/login', {
          method: 'POST',
          headers: { 'Content-Type': 'application/json' },
          body: JSON.stringify({ voter_id, password })
        });
        const data = await res.json();
        if (!res.ok) throw new Error(data.message || 'Login failed');
        // Redirect based on role
        const dest = data.role === 'admin' ? '/admin' : '/vote';
        window.location.href = `${dest}?Authorization=Bearer%20${encodeURIComponent(data.token)}`;
      } catch (e) {
        errEl.textContent = e.message;
        errEl.classList.remove('hidden');
      }
    }
    document.addEventListener('keydown', e => { if (e.key === 'Enter') login(); });
  </script>
</body>
</html>
